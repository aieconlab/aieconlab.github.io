{{ define "main" }}
<section class="section-sm">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="title-bordered mb-5 d-flex align-items-center">
          <h1 class="h4">{{ .Title }}</h1>
          <ul class="list-inline social-icons ml-auto mr-3 d-none d-sm-block">
            {{ range site.Params.social }}
            <li class="list-inline-item"><a href="{{ .link | safeURL }}" aria-label="{{ .name }}"
              data-ui-aria-label="{{ .ui_key }}"><i class="{{.icon }}" aria-hidden="true"></i></a></li>
            {{ end }}
          </ul>
        </div>
      </div>
      <div class="col-md-6">
        <div class="content mb-5">{{ .Content }}
          <h4 class="mt-5" data-ui-i18n="write_email">{{ i18n "write_email" }}</h4>
          <p><i class="fas fa-envelope-open-text mr-2 text-primary"></i>{{ site.Params.email | markdownify }}</p>
        </div>
      </div>
      <div class="col-md-6">
        <form method="POST" action="{{site.Params.contact_form_action}}">
          <div class="form-group">
            <label for="name"><span data-ui-i18n="name">{{ i18n "name" }}</span> (<span data-ui-i18n="required">필수</span>)</label>
            <input type="text" name="name" id="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="email"><span data-ui-i18n="email">{{ i18n "email" }}</span> (<span data-ui-i18n="required">필수</span>)</label>
            <input type="email" name="email" id="email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="message" data-ui-i18n="message">메시지</label>
            <textarea name="message" id="message" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" data-ui-i18n="send">{{ i18n "send"}}</button>
        </form>
      </div>
    </div>
  </div>
</section>
{{ end }}
