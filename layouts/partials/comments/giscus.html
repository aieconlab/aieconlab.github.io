{{- $config := site.Data.comments -}}
{{- $showComments := and $config.enable .IsPage (eq .Section "post") -}}

{{- if $showComments -}}
<section id="staff-comments"
         class="staff-comments mt-5"
         aria-labelledby="staff-comments-title"
         aria-describedby="staff-comments-description staff-comments-help">
  <div class="staff-comments__header">
    <p class="staff-comments__eyebrow">AIEconLab</p>
    <h2 id="staff-comments-title" class="h3 mb-2">운영진 코멘트</h2>
    <p id="staff-comments-description" class="staff-comments__description mb-0">
      코멘트는 이 페이지에서 누구나 읽을 수 있습니다. 작성은 등록된 운영진 GitHub 계정만 가능합니다.
    </p>
    <p id="staff-comments-help" class="staff-comments__help">
      아래 입력창에서 GitHub로 로그인한 뒤 바로 작성하세요. 저장소 협업자 계정의 코멘트만 등록됩니다.
    </p>
  </div>

  <div class="giscus mt-4">
    <script src="https://giscus.app/client.js"
            data-repo="{{ $config.repo }}"
            data-repo-id="{{ $config.repo_id }}"
            data-category="{{ $config.category }}"
            data-category-id="{{ $config.category_id }}"
            data-mapping="{{ $config.mapping }}"
            data-strict="{{ if $config.strict }}1{{ else }}0{{ end }}"
            data-reactions-enabled="0"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="light"
            data-lang="ko"
            data-loading="lazy"
            crossorigin="anonymous"
            async>
    </script>
  </div>
  <noscript>
    운영진 코멘트를 이 페이지에서 읽으려면 브라우저에서 JavaScript를 활성화해 주세요.
  </noscript>
</section>
{{- end -}}
