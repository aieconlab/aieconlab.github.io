{{ "<!-- categories -->" | safeHTML }}
<div class="widget">
  <h5 class="widget-title"><span data-ui-i18n="categories">{{ i18n "categories" }}</span></h5>
  {{- if isset site.Taxonomies "categories" }}
  {{- if not (eq (len site.Taxonomies.categories) 0) }}
  <ul class="list-unstyled widget-list">
    {{- range $name, $items := site.Taxonomies.categories }}
    <li><a href="{{ `categories/` | relLangURL }}{{ $name | urlize }}/" class="d-flex"><span data-ui-category="{{ $name }}">{{ replace $name "_" " " }}</span>
        <small class="ml-auto">({{ len $items }})</small></a></li>
    {{- end }}
  </ul>
  {{- end }}
  {{- end }}
</div>
